# =============================================================================
# AgentDash — Production Nginx Reverse Proxy
# =============================================================================
# Usage:
#   1. Copy this file to /etc/nginx/sites-available/agentdash
#   2. Replace YOUR_DOMAIN with your actual domain
#   3. Replace certificate paths with your actual SSL certs
#      (use certbot for free Let's Encrypt certs: certbot --nginx -d your.domain)
#   4. sudo ln -s /etc/nginx/sites-available/agentdash /etc/nginx/sites-enabled/
#   5. sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

upstream agentdash {
    server 127.0.0.1:3100;
    keepalive 64;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    # --- SSL -----------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # --- Security Headers ----------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # --- General Settings ----------------------------------------------------
    client_max_body_size 50m;
    proxy_read_timeout 300s;
    proxy_connect_timeout 10s;

    # --- WebSocket (live events) ---------------------------------------------
    location /ws {
        proxy_pass http://agentdash;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # --- Auth endpoints (strict rate limit) ----------------------------------
    location /api/auth/ {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://agentdash;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- API (standard rate limit) -------------------------------------------
    location /api/ {
        limit_req zone=api burst=60 nodelay;
        proxy_pass http://agentdash;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- UI (static assets, no rate limit) -----------------------------------
    location / {
        proxy_pass http://agentdash;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Health check (no rate limit) ----------------------------------------
    location = /api/health {
        proxy_pass http://agentdash;
        proxy_set_header Host $host;
    }
}
