services:
  agentdash:
    image: "${AGENTDASH_IMAGE:?AGENTDASH_IMAGE must be set}"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOST: "${HOST:-0.0.0.0}"
      PORT: "${PORT:-3100}"
      PAPERCLIP_HOME: "/paperclip"
      PAPERCLIP_DEPLOYMENT_MODE: "${PAPERCLIP_DEPLOYMENT_MODE:-authenticated}"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "${PAPERCLIP_DEPLOYMENT_EXPOSURE:-private}"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:?PAPERCLIP_PUBLIC_URL must be set}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    ports:
      - "${AGENTDASH_PORT:-3100}:3100"
    volumes:
      - "${AGENTDASH_DATA_DIR:-./data}:/paperclip"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3100/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
