name: PR

on:
  pull_request:
    branches:
      - master
      - main

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  policy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate PR description
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: node scripts/ci/check-pr-process.mjs

      - name: Block leftover merge-conflict markers
        run: node scripts/ci/check-conflict-markers.mjs

      - name: Block manual lockfile edits
        if: github.head_ref != 'chore/refresh-lockfile'
        run: |
          # Diff the PR branch against its merge base so recent base-branch commits
          # do not masquerade as changes made by the PR itself.
          changed="$(git diff --name-only "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}")"
          if printf '%s\n' "$changed" | grep -qx 'pnpm-lock.yaml'; then
            echo "Do not commit pnpm-lock.yaml in pull requests. CI owns lockfile updates."
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate Dockerfile deps stage
        run: node ./scripts/check-docker-deps-stage.mjs

      - name: Enforce architectural golden rules
        # Mechanical enforcement of the invariants documented in CLAUDE.md /
        # AGENTS.md (schema exports, localStorage branding, …). Errors fail the
        # PR; warnings are surfaced with remediation but do not block. See
        # loops/ARCHITECTURE.md.
        run: node ./scripts/check-architecture.mjs

      - name: Validate dependency resolution when manifests change
        run: |
          changed="$(git diff --name-only "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}")"
          manifest_pattern='(^|/)package\.json$|^pnpm-workspace\.yaml$|^\.npmrc$|^pnpmfile\.(cjs|js|mjs)$'
          if printf '%s\n' "$changed" | grep -Eq "$manifest_pattern"; then
            pnpm install --lockfile-only --ignore-scripts --no-frozen-lockfile
          fi

  verify:
    needs: [policy]
    runs-on: ubuntu-latest
    # 35 (was 20): once tests pass, the full lane (install + test:run + build +
    # release canary dry-run) runs to completion and exceeds 20m. The 20m cap
    # was only "passing" because verify used to fail fast at a broken test.
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify deep-interview SKILL.md is in sync with the upstream pin
        # Runs `scripts/sync-skill-md.mjs` (which falls back to the
        # checked-in fixture at `scripts/fixtures/skill-md-<version>.md`
        # in environments without OMC installed) and asserts the
        # generated `packages/shared/src/deep-interview-skill.ts` is
        # byte-identical. Any drift must be regenerated locally and
        # re-committed via `pnpm sync-skill-md`.
        run: pnpm verify-skill-md

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Run Hermes onboarding regression lane
        run: pnpm run test:regression:hermes-onboarding

      - name: Run tests
        run: pnpm test:run

      - name: Verify release registry test coverage
        run: pnpm run test:release-registry

      - name: Build
        run: pnpm build

      - name: Release canary dry run
        run: |
          git checkout -B master HEAD
          git checkout -- pnpm-lock.yaml
          ./scripts/release.sh canary --skip-verify --dry-run

  # MSP launch sign-off — its own required-check job. The launch-signoff policy
  # (scripts/ci/check-launch-signoff.mjs) lists `launch-signoff` as a required
  # context and requires a dedicated job depending on `policy`; previously the
  # suite ran as a verify step, so the policy self-check failed on every PR.
  launch-signoff:
    runs-on: ubuntu-latest
    needs: [policy]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify MSP launch signoff checks
        run: pnpm run test:launch-signoff

  # Dependency vulnerability audit.
  #
  # BLOCKING required check: this job FAILS the PR when `pnpm audit` finds any
  # HIGH/CRITICAL advisory reachable through the production dependency tree.
  # The HIGH/CRITICAL production advisories present at launch review (drizzle-orm
  # SQLi, react-router DoS/XSS, defu/path-to-regexp/lodash-es/undici/hono/
  # form-data/fast-uri/tmp/multer/ws) were bumped or pinned via root
  # `pnpm.overrides`, so a clean tree is the expectation. New HIGH/CRITICAL
  # production advisories must be fixed (bump/override) — do NOT re-add
  # `continue-on-error` to silence the gate. Dev-only advisories (vitest, vite,
  # picomatch reached only via test tooling) are excluded by `--prod` and never
  # block. Keep this as its own fast job and add it to branch protection.
  dependency-audit:
    needs: [policy]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies (blocking)
        # `pnpm audit --audit-level=high --prod` exits non-zero on any
        # HIGH/CRITICAL advisory in the production tree, failing the step and
        # the job. No `|| true`, no `continue-on-error` — findings block merge.
        run: pnpm run audit:deps

  e2e:
    needs: [policy]
    runs-on: ubuntu-latest
    # 60 (was 45/30): the job runs pnpm install + build + a Playwright
    # browser install + the e2e suite. With `--no-shell` the install now
    # COMPLETES fast (~1s edge-cached Chromium download + extract; the
    # hang-prone chromium-headless-shell artifact is skipped), so the cold
    # SEEDING run lands well inside this budget: ~3m build + ~17m suite. The
    # saving browser cache below removes even the install on warm runs.
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Verify hosted Chrome
        run: google-chrome --version

      # Derive the resolved @playwright/test version from the lockfile so the
      # browser cache key invalidates automatically on a Playwright bump.
      - name: Resolve Playwright version
        id: playwright-version
        run: |
          version="$(node -e "const fs=require('fs');const lock=fs.readFileSync('pnpm-lock.yaml','utf8');const m=lock.match(/@playwright\/test@([0-9]+\.[0-9]+\.[0-9]+)/);if(!m){console.error('Could not resolve @playwright/test version from pnpm-lock.yaml');process.exit(1);}console.log(m[1]);")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved @playwright/test version: $version"

      # Full actions/cache (restore at step start AND save in the post-job on
      # success). The first green run seeds the browser cache so every later
      # run restores it and skips the hang-prone download entirely. This
      # replaces the earlier restore-only + explicit-save pair.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      # The single `npx playwright install --with-deps chromium` step used to
      # hang here: the Chromium download finished in ~1 min, then the
      # system-deps/apt install stalled (network/apt) until the 45m job
      # timeout killed and CANCELED the whole run, failing every PR. e2e is a
      # required, enforce_admins check, so this blocked all merges.
      #
      # Fix: split system-deps from the browser binary, each with a
      # per-attempt `timeout` + 3-attempt retry loop. A hang now fails fast
      # and retries instead of burning the whole budget. The browser cache
      # above still eliminates the (separate) binary download on warm runs.
      # `timeout -s KILL`: a stalled Playwright download ignores the default
      # SIGTERM (node stays blocked in the socket read), so a plain `timeout`
      # never actually reaps the hang and the step ran to the 45m job
      # backstop. SIGKILL force-terminates it, so each attempt is bounded for
      # real and the retry loop can move on.
      - name: Install Playwright system dependencies
        env:
          # Route Playwright artifact downloads through Playwright's official
          # Akamai edge host instead of cdn.playwright.dev, which intermittently
          # throttles GitHub runners and stalls the browser download until the
          # per-attempt timeout. The Akamai edge serves the same Chrome-for-
          # Testing (builds/cft/...) layout this Playwright version needs and
          # responds fast. (npmmirror does NOT host the cft layout — it 404s.)
          PLAYWRIGHT_DOWNLOAD_HOST: https://playwright-akamai.azureedge.net
        run: |
          ok=0
          for i in 1 2 3; do
            if timeout -s KILL 5m npx playwright install-deps chromium; then ok=1; break; fi
            echo "playwright install-deps attempt $i failed/hung; retrying"; sleep 5
          done
          [ "$ok" = 1 ] || { echo "playwright install-deps failed after retries"; exit 1; }

      - name: Install Playwright browser binary
        id: playwright-install
        # Only on a cache miss; on a cache hit the binary is already restored
        # and we skip the (hang-prone) download entirely.
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        env:
          # Route the Chromium download through Playwright's official Akamai
          # edge host instead of cdn.playwright.dev, which intermittently
          # throttles GitHub runners and stalls the download until the per-
          # attempt timeout. The Akamai edge resolves to the Chrome-for-Testing
          # public bucket (verified 206 application/zip) and completes the
          # install quickly so the actions/cache step seeds reliably.
          PLAYWRIGHT_DOWNLOAD_HOST: https://playwright-akamai.azureedge.net
        run: |
          ok=0
          for i in 1 2 3; do
            # Each attempt starts from a clean browser dir. `timeout -s KILL`
            # reaps the parent npx/node but not the download/extract children
            # Playwright spawns; those orphans keep writing to
            # ~/.cache/ms-playwright, so a bare retry races a second installer
            # into a half-written dir and corrupts the extract. Wiping the dir
            # makes every attempt independent and self-contained.
            #
            # `--no-shell`: the main Chromium zip downloads in ~1s (GitHub
            # edge-cached), but the SECONDARY `chromium-headless-shell`
            # artifact hangs silently against cdn.playwright.dev until the
            # per-attempt timeout — that hang was what burned all 3 retries
            # and failed every PR. The e2e suite runs headless with full
            # Chromium (Playwright's default headless mode = full Chromium,
            # NOT the separate shell; the config sets browserName "chromium"
            # with no channel), so the shell is unused at runtime. Skipping
            # it makes the install COMPLETE fast and seed the cache. 8m per
            # attempt is ample now that the hang-prone artifact is gone.
            rm -rf ~/.cache/ms-playwright
            if timeout -s KILL 8m npx playwright install --no-shell chromium; then ok=1; break; fi
            echo "playwright install attempt $i failed/hung; retrying"
            pkill -f 'playwright|chrome-linux' 2>/dev/null || true
            sleep 5
          done
          [ "$ok" = 1 ] || { echo "playwright install failed after retries"; exit 1; }

      - name: Generate Paperclip config
        run: |
          mkdir -p ~/.paperclip/instances/default
          cat > ~/.paperclip/instances/default/config.json << 'CONF'
          {
            "$meta": { "version": 1, "updatedAt": "2026-01-01T00:00:00.000Z", "source": "onboard" },
            "database": { "mode": "embedded-postgres" },
            "logging": { "mode": "file" },
            "server": { "deploymentMode": "local_trusted", "host": "127.0.0.1", "port": 3100 },
            "auth": { "baseUrlMode": "auto" },
            "storage": { "provider": "local_disk" },
            "secrets": { "provider": "local_encrypted", "strictMode": false }
          }
          CONF

      - name: Run e2e tests
        env:
          PAPERCLIP_E2E_SKIP_LLM: "true"
          # Successor of #295: the onboarding-deep-interview spec
          # requires the /assess endpoint to route through the
          # deep-interview engine (not the legacy assess path). Without
          # this flag the engine returns 503 on every turn and the spec
          # parade fails. The webServer subprocess in
          # tests/e2e/playwright.config.ts forwards process.env, so
          # setting it here makes it visible to the booted server.
          AGENTDASH_DEEP_INTERVIEW_ASSESS: "true"
          # Successor of #311: specs run alphabetically in one
          # webServer process, so onboarding-deep-interview's
          # ensureCompanyExists helper creates a company first, then
          # signoff-policy's beforeAll tries to POST a SECOND company
          # and hits the #102 single-company-installation guard (409).
          # The override here matches what the dev docs already promise
          # for local_trusted dev (`AGENTDASH_DEV_MODE=true`), but is
          # set explicitly so the bypass intent is obvious from the CI
          # config alone.
          AGENTDASH_ALLOW_MULTI_COMPANY: "true"
          # Successor of #311 (round 2): the signoff-policy suite alone
          # creates ~7 issues in one company in rapid succession, plus
          # the prior specs eat ~50 requests against the same actor key.
          # The default 200-req / 15-min ceiling (server/src/middleware/
          # rate-limit.ts) trips inside the suite and returns 429 on
          # POST /companies/:id/issues — manifests as
          # \`expect(res.ok()).toBe(true)\` failures in createIssueWithPolicy.
          # Disable rate limiting for the e2e run; the per-actor limit
          # is a production-traffic concern, not a test concern.
          AGENTDASH_RATE_LIMIT_DISABLED: "true"
          PLAYWRIGHT_CHROMIUM_CHANNEL: "chrome"
          # Successor of #311 (round 3) / closes #315: the
          # onboarding.spec wizard test picks "Claude Code" (claude_local)
          # and OnboardingWizard.handleStep2Next runs a real adapter
          # binary probe before advancing. CI runners have no Claude
          # binary → probe returns failed → step 2 never transitions
          # to step 3. The bypass returns a synthetic "pass" so the
          # test can exercise the rest of the wizard.
          AGENTDASH_ADAPTER_ENV_BYPASS: "true"
        run: pnpm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            tests/e2e/playwright-report/
            tests/e2e/test-results/
          retention-days: 14
