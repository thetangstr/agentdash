name: Production Readiness

on:
  pull_request:
    branches:
      - master
      - main
  push:
    branches:
      - main
  schedule:
    - cron: "43 12 * * *"
  workflow_dispatch:
    inputs:
      allow_github_hosted_target:
        description: Allow GitHub-hosted runners to satisfy the target-machine gate for this audit run
        required: false
        type: boolean
        default: false
      launch_smoke_base_url:
        description: Optional deployed HTTPS URL override for this manual launch-smoke run
        required: false
        type: string
      launch_smoke_email_template:
        description: Optional email template override, for example launch-smoke+{run}@example.com
        required: false
        type: string
      launch_smoke_billing:
        description: Require Stripe Checkout session creation for this manual launch-smoke run
        required: false
        type: choice
        default: from-vars
        options:
          - from-vars
          - "true"
          - "false"
      launch_smoke_expect_llm:
        description: Require a real CoS/LLM reply for this manual launch-smoke run
        required: false
        type: choice
        default: from-vars
        options:
          - from-vars
          - "true"
          - "false"

permissions:
  contents: read
  actions: read

concurrency:
  group: production-readiness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  config-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Verify audit helper
        run: node --test scripts/ci/audit-production-readiness-config.test.mjs

      - name: Audit production gate configuration
        env:
          GH_TOKEN: ${{ secrets.PRODUCTION_READINESS_AUDIT_TOKEN || github.token }}
          AGENTDASH_TARGET_RUNNER_LABELS: ${{ vars.AGENTDASH_TARGET_RUNNER_LABELS }}
          AGENTDASH_LAUNCH_SMOKE_BASE_URL: ${{ vars.AGENTDASH_LAUNCH_SMOKE_BASE_URL }}
          AGENTDASH_LAUNCH_SMOKE_EMAIL_TEMPLATE: ${{ vars.AGENTDASH_LAUNCH_SMOKE_EMAIL_TEMPLATE }}
          AGENTDASH_LAUNCH_SMOKE_BILLING: ${{ vars.AGENTDASH_LAUNCH_SMOKE_BILLING }}
          AGENTDASH_LAUNCH_SMOKE_EXPECT_LLM: ${{ vars.AGENTDASH_LAUNCH_SMOKE_EXPECT_LLM }}
          ALLOW_GITHUB_HOSTED_TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.allow_github_hosted_target || false }}
        run: |
          args=(
            --repo "$GITHUB_REPOSITORY"
            --output "$RUNNER_TEMP/production-readiness-config.json"
            --use-actions-vars-context
          )
          if [ "$ALLOW_GITHUB_HOSTED_TARGET" = "true" ]; then
            args+=(--allow-github-hosted-target)
          fi
          node scripts/ci/audit-production-readiness-config.mjs "${args[@]}"

      - name: Upload audit summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: production-readiness-config
          path: ${{ runner.temp }}/production-readiness-config.json
          if-no-files-found: ignore
          retention-days: 14

  launch-smoke:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run deployed launch smoke
        env:
          VAR_LAUNCH_SMOKE_BASE_URL: ${{ vars.AGENTDASH_LAUNCH_SMOKE_BASE_URL }}
          VAR_LAUNCH_SMOKE_EMAIL_TEMPLATE: ${{ vars.AGENTDASH_LAUNCH_SMOKE_EMAIL_TEMPLATE }}
          VAR_LAUNCH_SMOKE_BILLING: ${{ vars.AGENTDASH_LAUNCH_SMOKE_BILLING || 'false' }}
          VAR_LAUNCH_SMOKE_EXPECT_LLM: ${{ vars.AGENTDASH_LAUNCH_SMOKE_EXPECT_LLM || 'false' }}
          WORKFLOW_INPUT_LAUNCH_SMOKE_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.launch_smoke_base_url || '' }}
          WORKFLOW_INPUT_LAUNCH_SMOKE_EMAIL_TEMPLATE: ${{ github.event_name == 'workflow_dispatch' && inputs.launch_smoke_email_template || '' }}
          WORKFLOW_INPUT_LAUNCH_SMOKE_BILLING: ${{ github.event_name == 'workflow_dispatch' && inputs.launch_smoke_billing || 'from-vars' }}
          WORKFLOW_INPUT_LAUNCH_SMOKE_EXPECT_LLM: ${{ github.event_name == 'workflow_dispatch' && inputs.launch_smoke_expect_llm || 'from-vars' }}
          AGENTDASH_LAUNCH_SMOKE_PASSWORD: ${{ secrets.AGENTDASH_LAUNCH_SMOKE_PASSWORD }}
          AGENTDASH_LAUNCH_SMOKE_REQUIRED: "true"
        run: |
          base_url="${WORKFLOW_INPUT_LAUNCH_SMOKE_BASE_URL:-$VAR_LAUNCH_SMOKE_BASE_URL}"
          email_template="${WORKFLOW_INPUT_LAUNCH_SMOKE_EMAIL_TEMPLATE:-$VAR_LAUNCH_SMOKE_EMAIL_TEMPLATE}"
          billing="$VAR_LAUNCH_SMOKE_BILLING"
          expect_llm="$VAR_LAUNCH_SMOKE_EXPECT_LLM"

          if [ "$WORKFLOW_INPUT_LAUNCH_SMOKE_BILLING" != "from-vars" ]; then
            billing="$WORKFLOW_INPUT_LAUNCH_SMOKE_BILLING"
          fi
          if [ "$WORKFLOW_INPUT_LAUNCH_SMOKE_EXPECT_LLM" != "from-vars" ]; then
            expect_llm="$WORKFLOW_INPUT_LAUNCH_SMOKE_EXPECT_LLM"
          fi

          AGENTDASH_LAUNCH_SMOKE_BASE_URL="$base_url" \
          AGENTDASH_LAUNCH_SMOKE_EMAIL_TEMPLATE="$email_template" \
          AGENTDASH_LAUNCH_SMOKE_BILLING="${billing:-false}" \
          AGENTDASH_LAUNCH_SMOKE_EXPECT_LLM="${expect_llm:-false}" \
          pnpm run test:launch-smoke

      - name: Upload launch smoke diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: production-launch-smoke
          path: |
            tests/launch-smoke/playwright-report/
            tests/launch-smoke/test-results/
          if-no-files-found: ignore
          retention-days: 14
