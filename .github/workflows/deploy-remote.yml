name: Deploy Remote

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub environment that stores the remote deploy secrets
        required: true
        type: string
        default: production
      image_tag:
        description: GHCR image tag to deploy (for example latest, agentdash-main, sha-<shortsha>, 2026.331.0, or v2026.331.0)
        required: true
        type: string
        default: latest
      deploy_dir:
        description: Absolute path on the remote machine where AgentDash should live
        required: true
        type: string
        default: /opt/agentdash

concurrency:
  group: deploy-remote-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_SSH_KEY: ${{ secrets.REMOTE_SSH_KEY }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          REMOTE_ENV_FILE: ${{ secrets.REMOTE_ENV_FILE }}
        run: |
          for key in REMOTE_HOST REMOTE_USER REMOTE_SSH_KEY GHCR_USERNAME GHCR_READ_TOKEN REMOTE_ENV_FILE; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key" >&2
              exit 1
            fi
          done

      - name: Prepare SSH
        env:
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_PORT: ${{ secrets.REMOTE_PORT }}
          REMOTE_SSH_KEY: ${{ secrets.REMOTE_SSH_KEY }}
          REMOTE_KNOWN_HOSTS: ${{ secrets.REMOTE_KNOWN_HOSTS }}
        run: |
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$REMOTE_SSH_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"

          if [ -n "${REMOTE_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$REMOTE_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          else
            ssh-keyscan -p "${REMOTE_PORT:-22}" "$REMOTE_HOST" > "$HOME/.ssh/known_hosts"
          fi

          chmod 644 "$HOME/.ssh/known_hosts"

      - name: Prepare deploy files
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          DEPLOY_HEALTHCHECK_URL: ${{ secrets.DEPLOY_HEALTHCHECK_URL }}
          REMOTE_ENV_FILE: ${{ secrets.REMOTE_ENV_FILE }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          mkdir -p .deploy
          printf '%s\n' "$REMOTE_ENV_FILE" > .deploy/.env
          {
            printf 'GHCR_USERNAME=%q\n' "$GHCR_USERNAME"
            printf 'GHCR_TOKEN=%q\n' "$GHCR_READ_TOKEN"
            printf 'AGENTDASH_IMAGE=%q\n' "ghcr.io/${GITHUB_REPOSITORY}:${IMAGE_TAG}"
            if [ -n "${DEPLOY_HEALTHCHECK_URL:-}" ]; then
              printf 'AGENTDASH_HEALTHCHECK_URL=%q\n' "$DEPLOY_HEALTHCHECK_URL"
            fi
          } > .deploy/runtime.env

      - name: Upload deployment files
        env:
          DEPLOY_DIR: ${{ inputs.deploy_dir }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_PORT: ${{ secrets.REMOTE_PORT }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
        run: |
          ssh -p "${REMOTE_PORT:-22}" "$REMOTE_USER@$REMOTE_HOST" "mkdir -p '$DEPLOY_DIR'"
          scp -P "${REMOTE_PORT:-22}" deploy/docker-compose.remote.yml "$REMOTE_USER@$REMOTE_HOST:$DEPLOY_DIR/docker-compose.yml"
          scp -P "${REMOTE_PORT:-22}" scripts/deploy-remote.sh "$REMOTE_USER@$REMOTE_HOST:$DEPLOY_DIR/deploy-remote.sh"
          scp -P "${REMOTE_PORT:-22}" .deploy/.env "$REMOTE_USER@$REMOTE_HOST:$DEPLOY_DIR/.env"
          scp -P "${REMOTE_PORT:-22}" .deploy/runtime.env "$REMOTE_USER@$REMOTE_HOST:$DEPLOY_DIR/.runtime.env"

      - name: Deploy on remote machine
        env:
          DEPLOY_DIR: ${{ inputs.deploy_dir }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_PORT: ${{ secrets.REMOTE_PORT }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
        run: |
          ssh -p "${REMOTE_PORT:-22}" "$REMOTE_USER@$REMOTE_HOST" \
            "cd '$DEPLOY_DIR' && chmod +x ./deploy-remote.sh && set -a && . ./.runtime.env && set +a && ./deploy-remote.sh '$DEPLOY_DIR' && rm -f ./.runtime.env"
