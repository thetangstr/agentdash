services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-paperclip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-paperclip}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-paperclip} -d ${POSTGRES_DB:-paperclip}"]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    image: ${AGENTDASH_IMAGE:?AGENTDASH_IMAGE must be pinned to a release image, for example ghcr.io/<owner>/<repo>:sha-<commit>}
    pull_policy: always
    restart: unless-stopped
    ports:
      - "${PAPERCLIP_PORT:-3100}:3100"
    env_file:
      - ${AGENTDASH_RUNTIME_ENV_FILE:-./agentdash.env}
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-paperclip}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-paperclip}}
      HOST: 0.0.0.0
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: ${PAPERCLIP_DEPLOYMENT_MODE:-authenticated}
      PAPERCLIP_DEPLOYMENT_EXPOSURE: ${PAPERCLIP_DEPLOYMENT_EXPOSURE:-private}
      AGENTDASH_REQUIRE_AGENT_HARNESS_PREFLIGHT: ${AGENTDASH_REQUIRE_AGENT_HARNESS_PREFLIGHT:-true}
      PAPERCLIP_PUBLIC_URL: ${PAPERCLIP_PUBLIC_URL:?PAPERCLIP_PUBLIC_URL must be set}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}
      PAPERCLIP_MIGRATION_AUTO_APPLY: ${PAPERCLIP_MIGRATION_AUTO_APPLY:-true}
    volumes:
      - paperclip-data:/paperclip
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  paperclip-data:
